<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BNYA — Inauguration</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Cinzel (ceremonial display) + Cormorant Garamond (body) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- ═══════════════════════════════════════════
       BACKGROUND MANDALA (decorative SVG overlay)
       ═══════════════════════════════════════════ -->
  <div class="bg-mandala" aria-hidden="true">
    <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
      <!-- Layered concentric decorative rings -->
      <g opacity="0.06" stroke="#D4A017" fill="none" stroke-width="1">
        <circle cx="400" cy="400" r="350" />
        <circle cx="400" cy="400" r="300" />
        <circle cx="400" cy="400" r="250" />
        <circle cx="400" cy="400" r="200" />
        <circle cx="400" cy="400" r="150" />
        <!-- Petal pattern outer -->
        <g transform="translate(400,400)">
          <ellipse rx="30" ry="120" transform="rotate(0)" />
          <ellipse rx="30" ry="120" transform="rotate(30)" />
          <ellipse rx="30" ry="120" transform="rotate(60)" />
          <ellipse rx="30" ry="120" transform="rotate(90)" />
          <ellipse rx="30" ry="120" transform="rotate(120)" />
          <ellipse rx="30" ry="120" transform="rotate(150)" />
          <!-- Inner petals -->
          <ellipse rx="18" ry="70" transform="rotate(15)" />
          <ellipse rx="18" ry="70" transform="rotate(45)" />
          <ellipse rx="18" ry="70" transform="rotate(75)" />
          <ellipse rx="18" ry="70" transform="rotate(105)" />
          <ellipse rx="18" ry="70" transform="rotate(135)" />
          <ellipse rx="18" ry="70" transform="rotate(165)" />
        </g>
      </g>
    </svg>
  </div>

  <!-- ═══════════════════════════════════════════
       LANDING SCREEN — shown before banner reveal
       ═══════════════════════════════════════════ -->
  <section class="landing-screen" id="landingScreen">
    <div class="landing-content">
      <!-- Decorative lamp icon (Unicode diya) -->
      <div class="diya-icon" aria-hidden="true">🪔</div>

      <p class="landing-eyebrow">You are cordially invited to witness</p>
      <h1 class="landing-title">The Grand<br />Inauguration</h1>
      <p class="landing-subtitle">
        Bharath Nava Yuva Association<br />
        <span class="landing-subtitle-accent">BNYA</span>
      </p>

      <!-- ── REVEAL BUTTON ── -->
      <button class="reveal-btn" id="revealBtn" aria-label="Reveal inauguration banner">
        <span class="reveal-btn__inner">
          <svg class="reveal-btn__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <path d="M12 3v4M12 3l-3 3M12 3l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" />
            <rect x="3" y="7" width="18" height="14" rx="1" stroke="currentColor" stroke-width="1.8" />
            <path d="M3 11h18" stroke="currentColor" stroke-width="1.8" />
          </svg>
          Reveal Banner
        </span>
        <span class="reveal-btn__glow" aria-hidden="true"></span>
      </button>

      <!-- Decorative bottom flourish -->
      <div class="landing-flourish" aria-hidden="true">✦ &nbsp; ✦ &nbsp; ✦</div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       SCROLL / BANNER STAGE
       ═══════════════════════════════════════════ -->
  <section class="scroll-stage" id="scrollStage" aria-live="polite" aria-label="Inauguration banner">
    <div class="scroll-container" id="scrollContainer">
      <!-- Scroll rods (top & bottom cylinders that slide apart) -->
      <div class="rod rod--top" id="rodTop" aria-hidden="true"></div>

      <!-- The parchment that unrolls between the rods -->
      <div class="scroll-parchment" id="scrollParchment">
        <div class="parchment-inner" id="parchmentInner">

          <!-- ── 1. NGO LOGO ── -->
          <div class="logo-wrap" id="logoWrap">
            <img class="logo-img" src="logo.png" alt="BNYA emblem" />
          </div>

          <!-- ── 2. NGO NAME (typed letter-by-letter) ── -->
          <div class="ngo-name-wrap" id="ngoNameWrap">
            <!-- The typing target — JS fills this -->
            <h2 class="ngo-name" id="ngoName" aria-label="Bharath Nava Yuva Association"></h2>
            <!-- Blinking cursor -->
            <span class="cursor" id="typeCursor" aria-hidden="true">|</span>
          </div>

          <!-- Tagline (fades in after name) -->
          <p class="ngo-tagline" id="ngoTagline">
            Empowering Youth &nbsp;·&nbsp; Serving Bharat
          </p>

          <!-- ── 3. FEATURED IMAGE ── -->
          <div class="featured-image-wrap" id="featuredImageWrap">
            <!-- Placeholder image — swap src with real photo if desired -->
            <div class="featured-image-inner">
              <img class="featured-img" src="banner.png" alt="BNYA inaugural gathering" />
            </div>
            <!-- Caption -->
            <p class="featured-caption">
              "A new dawn for youth-led service across Bharath"
            </p>
          </div>

          <!-- ── FOOTER WITHIN SCROLL ── -->
          <div class="scroll-footer" id="scrollFooter">
            <div class="scroll-footer__divider" aria-hidden="true">
              <span>🌸</span><span>🌸</span><span>🌸</span>
            </div>
            <p class="scroll-footer__text">
              With blessings &amp; best wishes to all founding members
            </p>
            <p class="scroll-footer__year">২০২৪ &nbsp;·&nbsp; MMXXIV</p>
          </div>

        </div><!-- /parchment-inner -->
      </div><!-- /scroll-parchment -->

      <!-- Scroll rod bottom -->
      <div class="rod rod--bottom" id="rodBottom" aria-hidden="true"></div>
    </div>
  </section><!-- /scroll-stage -->

  <script src="script.js"></script>
</body>

</html>
